name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'Status: Stale'
          close-issue-label: 'Status: Wont Fix'
          exempt-issue-labels: 'Status: In Progress,Status: Blocked,Priority: Critical,Priority: High'
          stale-issue-message: |
            👋 This issue has had no activity for **30 days** and has been marked as stale.

            If this is still relevant, please leave a comment or update the issue and the stale label will be removed automatically.
            If no activity occurs within the next **14 days**, this issue will be closed automatically.

          close-issue-message: |
            🔒 This issue has been automatically closed due to inactivity.

            If you believe this is still relevant, feel free to reopen it with additional context.

          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: 'Status: Stale'
          close-pr-label: 'Status: Wont Fix'
          exempt-pr-labels: 'Status: In Progress,Status: Blocked,PR: Do Not Merge,Priority: Critical,Priority: High'
          stale-pr-message: |
            👋 This pull request has had no activity for **21 days** and has been marked as stale.

            If this is still being worked on, please push a commit or leave a comment and the stale label will be removed automatically.
            If no activity occurs within the next **7 days**, this PR will be closed automatically.

          close-pr-message: |
            🔒 This pull request has been automatically closed due to inactivity.

            If you'd like to continue this work, feel free to reopen it or open a new PR.

          remove-stale-when-updated: true
          ascending: true
          operations-per-run: 100
